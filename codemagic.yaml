workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      android_signing:
        - carrodasdelicias_keystore
      groups:
        - google_play
      vars:
        PACKAGE_NAME: "com.rdtech.carrodasdelicias"
      java: 21
      flutter: stable
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - $HOME/.gradle/caches
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/Library/Caches/CocoaPods
    scripts:
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      - name: Prepare build assets
        script: |
          mkdir -p "$CM_BUILD_DIR/assets/sounds"
          [ -f "$CM_BUILD_DIR/assets/sounds/.gitkeep" ] || touch "$CM_BUILD_DIR/assets/sounds/.gitkeep"
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Flutter analyze
        script: |
          flutter analyze
      - name: Flutter test
        script: |
          flutter test
      - name: Build Android Release
        script: |
          flutter build appbundle --release
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
      - build/**/outputs/**/*.aab
      - build/**/outputs/**/*.apk
    publishing:
      email:
        recipients:
          - rdg547@example.com
        notify:
          success: true
          failure: true

  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.rdtech.carrodasdelicias
      vars:
        BUNDLE_ID: "com.rdtech.carrodasdelicias"
      flutter: stable
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - $FLUTTER_ROOT/.pub-cache
        - $HOME/Library/Caches/CocoaPods
    scripts:
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Prepare build assets
        script: |
          mkdir -p "$CM_BUILD_DIR/assets/sounds"
          [ -f "$CM_BUILD_DIR/assets/sounds/.gitkeep" ] || touch "$CM_BUILD_DIR/assets/sounds/.gitkeep"
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      - name: Flutter analyze
        script: |
          flutter analyze
      - name: Build iOS IPA
        script: |
          flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      email:
        recipients:
          - rdg547@example.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        submit_to_testflight: true
